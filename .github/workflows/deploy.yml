name: Deploy .NET 10 API to Hostinger VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish API
        run: dotnet publish BackEnd/ShiftOne.Api/ShiftOne.Api.csproj -c Release -o ./publish -r linux-x64 --self-contained false

      - name: Deploy to Hostinger VPS via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 187.77.168.218
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          source: "./publish/*"
          target: "/var/www/shiftone-api"
          strip_components: 1

      - name: Restart API Service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 187.77.168.218
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            systemctl restart shiftone-api
